{% extends "base.html" %}
{% block content %}
  <div class="row g-3">
    <div class="col-12 col-lg-5">
      <div class="card card-soft">
        <div class="card-body">
          <div class="h6 mb-2">Make a prediction</div>
          <div class="mb-3">
            <label class="form-label">Choose trained model</label>
            <select class="form-select" id="predModelSelect"></select>
          </div>
          <form id="predictionForm" class="vstack gap-2"></form>
          <button class="btn btn-primary w-100 mt-3" id="predictBtn"><i class="bi bi-magic"></i> Predict demand</button>
          <div class="mt-3 d-none" id="predictionResult"></div>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-7">
      <div class="card card-soft">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="h6 mb-0">Prediction history</div>
            <a class="btn btn-sm btn-outline-primary" href="/reports"><i class="bi bi-file-earmark-arrow-down"></i> Export</a>
          </div>
          <div class="table-responsive">
            <table class="table table-sm table-hover align-middle" id="predHistoryTable"></table>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/predictions.js') }}?v={{ config.get('APP_VERSION','1') }}"></script>
{% endblock %}
